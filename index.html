<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BibSlide — Tool for Churches</title>
    <meta name="description" content="BibSlide helps churches create beautiful PowerPoint slides for Bible verses and songs — fast and free." />
    <meta name="keywords" content="BibSlide, legliz, bib, vèsè, ppt, chant d'espérance, Wanky Massenat" />
    <meta name="author" content="Wanky Massenat" />
    <link rel="canonical" href="https://bibleslide.org">
    
    <meta property="og:site_name" content="BibSlide">
    <meta property="og:title" content="BibSlide — Tool for Churches" />
    <meta property="og:description" content="Transform Bible verses into stunning PowerPoint slides instantly." />
    <meta property="og:image" content="https://bibleslide.org/assets/preview.png" />
    <meta property="og:url" content="https://bibleslide.org" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="icon" type="image/png" href="https://i.postimg.cc/X7j5bZCj/biblslide.png" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/serviceWorker.js');
        });
      }
    </script>
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        z-index: 9999;
      }
      #app-loading .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #app-loading .text {
        margin-top: 20px;
        font-size: 18px;
        font-weight: 600;
      }
      #app-loading .subtext {
        margin-top: 8px;
        font-size: 14px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div class="spinner"></div>
      <div class="text">Loading BibleSlide...</div>
      <div class="subtext">Please wait while we prepare your experience</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
